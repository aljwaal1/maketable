name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android platform
        run: |
          flutter create --platforms=android --org com.explapp --no-pub .
          rm -rf test

      - name: Configure Android
        run: |
          python3 - <<'PY'
          from pathlib import Path
          gradle = Path('android/app/build.gradle')
          text = gradle.read_text()
          text = text.replace('namespace = "com.explapp.excel_scanner_ar"', 'namespace = "com.explapp.excelscannerar"')
          text = text.replace('applicationId = "com.explapp.excel_scanner_ar"', 'applicationId = "com.explapp.excelscannerar"')
          text = text.replace('minSdk = flutter.minSdkVersion', 'minSdk = 24')
          gradle.write_text(text)

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          manifest.write_text('''<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <application
                  android:label="صورة إلى Excel"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>''')
          PY

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Copy APK
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/excel-scanner-ar.apk
          cat > DOWNLOAD_APK.md <<'EOF2'
          # تحميل التطبيق

          APK مباشر:

          `apk/excel-scanner-ar.apk`
          EOF2

      - name: Commit APK
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add apk/excel-scanner-ar.apk DOWNLOAD_APK.md
          git commit -m "Update APK" || echo "No changes"
          git push || echo "Push skipped"
