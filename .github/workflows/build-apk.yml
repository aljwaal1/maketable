name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Android
        run: |
          flutter create --platforms=android --org com.explapp --no-pub .
          rm -rf test
          rm -f analysis_options.yaml
          python3 - <<'PY'
          from pathlib import Path
          import re
          package='com.explapp.excel_scanner_ar'
          for p in [Path('android/app/build.gradle'), Path('android/app/build.gradle.kts')]:
              if not p.exists():
                  continue
              s=p.read_text()
              s=re.sub(r'applicationId\s*(=)?\s*"[^"]+"', lambda m: f'applicationId = "{package}"' if m.group(1) else f'applicationId "{package}"', s)
              s=re.sub(r'namespace\s*(=)?\s*"[^"]+"', lambda m: f'namespace = "{package}"' if m.group(1) else f'namespace "{package}"', s)
              s=re.sub(r'minSdkVersion\s+\d+', 'minSdkVersion 23', s)
              s=re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 23', s)
              p.write_text(s)
          PY

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release --no-shrink --no-tree-shake-icons

      - name: Copy APK
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/excel-scanner-ar.apk
          echo '# APK' > DOWNLOAD_APK.md
          echo '[Download APK](apk/excel-scanner-ar.apk)' >> DOWNLOAD_APK.md

      - name: Commit APK
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add apk/excel-scanner-ar.apk DOWNLOAD_APK.md
          git commit -m "Build APK" || echo "No changes to commit"
          git push || echo "Push skipped"
